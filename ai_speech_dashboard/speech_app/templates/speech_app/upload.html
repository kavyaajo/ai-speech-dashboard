{% extends 'speech_app/base.html' %}

{% block title %}Upload Audio{% endblock %}

{% block content %}

<div class="form-container">
    <div class="form-box">

        <h2 style="text-align:center;">Upload Audio</h2>
        <p style="text-align:center; font-size:13px; color:#777;">
            Upload your audio file and get transcription instantly.
        </p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <label>Title</label>
            <input type="text" name="title" placeholder="e.g. Meeting Recording" required>

            <label>Select Audio File</label>
            <input type="file" name="audio_file" required>

            <button type="submit" class="btn btn-primary">
                Upload & Transcribe
            </button>

        </form>

        <div style="text-align:center; margin-top:10px;">
            <a href="{% url 'dashboard' %}">← Back to Dashboard</a>
        </div>

    </div>
</div>

{% endblock %}
